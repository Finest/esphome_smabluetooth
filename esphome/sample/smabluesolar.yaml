substitutions:
  name: smablue-stream
  friendly_name: smablue-stream

  # Optional: set to true if you want a fallback AP for WiFi recovery.
  # (If you enable AP, also enable captive_portal or web_server.)
  enable_fallback_ap: "false"

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}


esp32:
  board: esp32dev
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_BT_ENABLED: "y"
      CONFIG_BT_BLUEDROID_ENABLED: "y"
      CONFIG_BT_CLASSIC_ENABLED: "y"
      CONFIG_BT_SPP_ENABLED: "y"
      CONFIG_BTDM_CTRL_MODE_BR_EDR_ONLY: "y"
      CONFIG_BT_BLE_ENABLED: "n"

external_components:
  # For production, use git:
  - source:
      type: git
      url: https://github.com/Finest/esphome_smabluetooth
      ref: main
    components: [smabluetooth_solar]
    refresh: 0sec

  # For local development, replace the above with:
  # - source:
  #     type: local
  #     path: ../components
  #   components: [smabluetooth_solar]
  #   refresh: 0sec

# Enable logging
logger:
  level: INFO


# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Optional fallback hotspot in case WiFi connection fails.
  # If you enable this, also enable captive_portal or web_server.
  ap:
    ssid: "${friendly_name} Fallback Hotspot"
    password: !secret wifi_password


button:
  - platform: template
    name: "Sync Inverter Time"
    on_press:
      - lambda: 'id(sma_inverter).trigger_time_sync();'
  - platform: template
    name: "Fetch Inverter Time"
    on_press:
      - lambda: 'id(sma_inverter).trigger_time_fetch();'

sensor:
  - platform: smabluetooth_solar
    id: sma_inverter
    update_interval: 10s

    # Inverter connection
    sma_inverter_bluetooth_mac: !secret sma_stream_bluetoothmac
    sma_inverter_password: !secret sma_stream_password

    # Tuning / robustness
    sma_inverter_delay_values: 800ms
    sma_inverter_btgetbyte_timeout: 5000ms

    # Throttle reconnect attempts after consecutive failures
    # (out of range, inverter busy, BT page timeouts, etc.).
    sma_inverter_reconnect_backoff: [5s, 10s, 20s, 40s, 60s]

    inverter_status: 
      name: "Inverter Status"

    grid_relay: 
      name: "Grid relay Status"

    phase_a:
      voltage:
          name: "Voltage Phase A"
      current:
          name: "Current Phase A"
      active_power:
          name: "Power Phase A"
    # NOTE: For single-phase inverters, Phase B/C do not exist.
    # If you keep them configured anyway (e.g. fixed dashboard layout),
    # the component will publish 0.0 so Home Assistant shows 0 instead of "unknown".
    phase_b:
      voltage:
        name: "Voltage Phase B"
      current:
        name: "Current Phase B"
      active_power:
        name: "Power Phase B"
    phase_c:
      voltage:
        name: "Voltage Phase C"
      current:
        name: "Current Phase C"
      active_power:
        name: "Power Phase C"

    pv1:
      voltage:
          name: "Voltage mppt1"
      current:
          name: "Current mppt1"
      active_power:
          name: "Power mppt1"

    pv2:
      voltage:
          name: "Voltage mppt2"
      current:
          name: "Current mppt2"
      active_power:
          name: "Power mppt2"

#    active_power:
#      name: "Grid Active Power"

#    pv_active_power:
#      name: "PV Active Power"

    frequency:
      name: "Frequency"

    energy_production_day:
      name: "Today's Generation"

    total_energy_production:
      name: "Total Energy Production"

    today_generation_time:
      name: "Today's Generation Time"  # derived from total op time baselines

    total_generation_time:
      name: "Total Generation Time"

    total_operation_time:
      name: "Total Operation Time"

    wakeup_time:
      name: "Wakeup Time"

    serial_number:
      name: "Serial Number"

    software_version:
      name: "Software Version"

    device_type:
      name: "Device Type"

    device_class:
      name: "Device Class"

    inverter_module_temp:
      name: "Inverter Module Temp"

    sma_inverter_bluetooth_signal_strength:
      name: "Inverter Bluetooth Signal Strength"

    inverter_time:
      name: "Inverter Clock"